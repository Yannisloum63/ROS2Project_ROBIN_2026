# Minimal project-level Nav2 parameter overrides for simulation.
# This file is intended to be used with nav2_bringup's bringup_launch.py via:
# params_file:=/path/to/ROS2Project_ROBIN_2026/config/nav2_params.yaml

amcl:
  ros__parameters:
    use_sim_time: true

bt_navigator:
  ros__parameters:
    use_sim_time: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

planner_server:
  ros__parameters:
    use_sim_time: true

controller_server:
  ros__parameters:
    use_sim_time: true

recoveries_server:
  ros__parameters:
    use_sim_time: true

map_server:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
